<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Semantic surfaces — light</title>
<link rel="stylesheet" href="_base.css">
<style>
  html { background:#f5efe6; }
  body { padding: 32px; background:#f5efe6; color:#2b2b2b; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .swatch-name { color:#2b2b2b; }
  .swatch-hex { color:#8a7f6e; }
</style>
</head>
<body class="light">
<div class="frame">
  <div class="grid">
    <div class="swatch">
      <div class="swatch-chip" style="background:#f5efe6; border-color:#e5dcc8;"></div>
      <div class="swatch-meta"><span class="swatch-name">bg</span><span class="swatch-hex">#f5efe6</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#ffffff; border-color:#e5dcc8;"></div>
      <div class="swatch-meta"><span class="swatch-name">surface</span><span class="swatch-hex">#ffffff</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#ede4d4; border-color:#e5dcc8;"></div>
      <div class="swatch-meta"><span class="swatch-name">divider</span><span class="swatch-hex">#ede4d4</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#e5dcc8; border-color:#d4c8b5;"></div>
      <div class="swatch-meta"><span class="swatch-name">border</span><span class="swatch-hex">#e5dcc8</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#2b2b2b; border-color:#e5dcc8;"></div>
      <div class="swatch-meta"><span class="swatch-name">fg</span><span class="swatch-hex">#2b2b2b</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#8a7f6e; border-color:#e5dcc8;"></div>
      <div class="swatch-meta"><span class="swatch-name">fg-muted</span><span class="swatch-hex">#8a7f6e</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#8b6f47; border-color:#e5dcc8;"></div>
      <div class="swatch-meta"><span class="swatch-name">accent</span><span class="swatch-hex">#8b6f47</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#7a5f3c; border-color:#e5dcc8;"></div>
      <div class="swatch-meta"><span class="swatch-name">accent-hover</span><span class="swatch-hex">#7a5f3c</span></div>
    </div>
  </div>
</div>
</body>
</html>
