<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room accents</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 32px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .room {
    background: var(--surface);
    border: var(--card-hairline);
    border-radius: var(--r-lg);
    padding: 18px;
    display: flex; flex-direction: column; gap: 10px;
    border-top: 3px solid var(--room-color);
  }
  .room-name { font-weight: 600; font-size: 14px; }
  .room-hex { font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.04em; }
  .room-swatch { height: 64px; border-radius: 10px; background: var(--room-color); }
</style>
</head>
<body>
<div class="frame">
  <div class="grid">
    <div class="room" style="--room-color:#c4a882;">
      <div class="row" style="justify-content:space-between;">
        <span class="room-name">My Room</span>
        <span class="room-hex">#c4a882</span>
      </div>
      <div class="room-swatch"></div>
      <span class="muted-label" style="text-transform:none; letter-spacing:0; font-weight:400; font-size:12px;">Personal · warm gold</span>
    </div>
    <div class="room" style="--room-color:#7a9e6b;">
      <div class="row" style="justify-content:space-between;">
        <span class="room-name">Study</span>
        <span class="room-hex">#7a9e6b</span>
      </div>
      <div class="room-swatch"></div>
      <span class="muted-label" style="text-transform:none; letter-spacing:0; font-weight:400; font-size:12px;">Academic · sage green</span>
    </div>
    <div class="room" style="--room-color:#6b8f9e;">
      <div class="row" style="justify-content:space-between;">
        <span class="room-name">Work</span>
        <span class="room-hex">#6b8f9e</span>
      </div>
      <div class="room-swatch"></div>
      <span class="muted-label" style="text-transform:none; letter-spacing:0; font-weight:400; font-size:12px;">Professional · slate blue</span>
    </div>
  </div>
</div>
</body>
</html>
