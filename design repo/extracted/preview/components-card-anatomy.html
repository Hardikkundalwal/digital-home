<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card anatomy</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 28px; }
  .stage {
    display: flex; gap: 28px; align-items: center;
  }
  .card {
    background: var(--surface);
    border-top: 3px solid var(--accent);
    border-right: 1px solid rgba(196,168,130,0.14);
    border-bottom: 1px solid rgba(196,168,130,0.14);
    border-left: 1px solid rgba(196,168,130,0.14);
    border-radius: 16px;
    padding: 20px;
    width: 230px;
    box-shadow: var(--shadow-1);
  }
  .card h3 { font-size: 15px; font-weight: 600; }
  .card p { font-size: 13px; color: var(--fg-muted); margin-top: 4px; }
  .card .meta { margin-top: 12px; font-size: 12px; color: var(--accent); }

  .legend { display: flex; flex-direction: column; gap: 10px; font-size: 12px; }
  .legend div { display: flex; align-items: baseline; gap: 8px; color: var(--fg-muted); }
  .legend .v { font-family: var(--font-mono); color: var(--accent); min-width: 56px; }
  .legend .k { color: var(--fg); }
</style>
</head>
<body>
<div class="stage">
  <div class="card">
    <h3>Hadron's Study</h3>
    <p>University tasks, notes, pomodoro</p>
    <div class="meta">5 remaining</div>
  </div>
  <div class="legend">
    <div><span class="v">16 px</span><span class="k">corner radius</span></div>
    <div><span class="v">20 px</span><span class="k">inner padding</span></div>
    <div><span class="v">3 px</span><span class="k">top accent bar</span></div>
    <div><span class="v">1 px</span><span class="k">gold hairline border</span></div>
    <div><span class="v">14% α</span><span class="k">hairline opacity</span></div>
    <div><span class="v">shadow-1</span><span class="k">resting elevation</span></div>
  </div>
</div>
</body>
</html>
