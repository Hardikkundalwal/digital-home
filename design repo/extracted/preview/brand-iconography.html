<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iconography</title>
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 14px;
  }
  .cell {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 6px;
    background: var(--surface);
    border: var(--card-hairline);
    border-radius: 10px;
  }
  .cell i { color: var(--accent); width: 22px; height: 22px; stroke-width: 1.75; }
  .cell span { font-size: 10px; color: var(--fg-muted); }
  .note {
    margin-top: 14px;
    font-size: 12px;
    color: var(--fg-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><i data-lucide="home"></i><span>home</span></div>
  <div class="cell"><i data-lucide="door-open"></i><span>door-open</span></div>
  <div class="cell"><i data-lucide="bed"></i><span>bed</span></div>
  <div class="cell"><i data-lucide="book-open"></i><span>book-open</span></div>
  <div class="cell"><i data-lucide="briefcase"></i><span>briefcase</span></div>
  <div class="cell"><i data-lucide="wifi"></i><span>wifi</span></div>
  <div class="cell"><i data-lucide="pencil"></i><span>pencil</span></div>
  <div class="cell"><i data-lucide="clipboard-list"></i><span>clipboard</span></div>
  <div class="cell"><i data-lucide="timer"></i><span>timer</span></div>
  <div class="cell"><i data-lucide="calendar"></i><span>calendar</span></div>
  <div class="cell"><i data-lucide="radio"></i><span>radio</span></div>
  <div class="cell"><i data-lucide="settings"></i><span>settings</span></div>
  <div class="cell"><i data-lucide="help-circle"></i><span>help</span></div>
  <div class="cell"><i data-lucide="play"></i><span>play</span></div>
  <div class="cell"><i data-lucide="pause"></i><span>pause</span></div>
  <div class="cell"><i data-lucide="undo-2"></i><span>undo-2</span></div>
  <div class="cell"><i data-lucide="plus"></i><span>plus</span></div>
  <div class="cell"><i data-lucide="x"></i><span>x</span></div>
  <div class="cell"><i data-lucide="arrow-left"></i><span>arrow-left</span></div>
  <div class="cell"><i data-lucide="arrow-right"></i><span>arrow-right</span></div>
  <div class="cell"><i data-lucide="sun"></i><span>sun</span></div>
  <div class="cell"><i data-lucide="cloud-sun"></i><span>cloud-sun</span></div>
  <div class="cell"><i data-lucide="cloud-rain"></i><span>cloud-rain</span></div>
  <div class="cell"><i data-lucide="headphones"></i><span>headphones</span></div>
</div>
<p class="note">Lucide · 1.5px stroke · 18px default · currentColor</p>
<script>lucide.createIcons();</script>
</body>
</html>
