<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bottom sheet</title>
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 0; background: #1a1a1a; min-height: 380px; }
  .scene {
    position: relative;
    width: 100%;
    height: 380px;
    background:
      radial-gradient(ellipse at 50% 36%, rgba(196,168,130,0.18), transparent 55%),
      linear-gradient(180deg, #2d2419 0%, #1a1410 100%);
    overflow: hidden;
  }
  .lamp {
    position: absolute;
    left: 50%; top: 18%;
    width: 220px; height: 60px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(255,210,140,0.4), transparent 70%);
    filter: blur(6px);
  }
  .floor {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 38%;
    background: linear-gradient(180deg, rgba(122,85,53,0.6), rgba(58,42,28,0.9));
  }

  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--sheet-glass-bg);
    -webkit-backdrop-filter: var(--sheet-glass-blur);
    backdrop-filter: var(--sheet-glass-blur);
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
    padding: 14px 20px 24px;
    border-top: 1px solid rgba(196,168,130,0.18);
  }
  .handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(245,240,232,0.25);
    margin: 0 auto 14px;
  }
  .sheet-title {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600;
    color: var(--fg);
    margin-bottom: 14px;
  }
  .sheet-title .ic { color: var(--accent); display: inline-flex; }
  .row { display:flex; align-items:center; gap: 10px; padding: 8px 0; }
  .check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--accent); flex-shrink: 0; }
  .check.done { background: var(--accent); }
  .label { font-size: 14px; color: var(--fg); }
  .label.done { color: var(--fg-muted); text-decoration: line-through; }
  i { width: 16px; height: 16px; stroke-width: 1.75; }
</style>
</head>
<body>
<div class="scene">
  <div class="lamp"></div>
  <div class="floor"></div>
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title"><span class="ic"><i data-lucide="pencil"></i></span> Tasks</div>
    <div class="row"><span class="check"></span><span class="label">Submit final paper draft</span></div>
    <div class="row"><span class="check"></span><span class="label">Email professor about extension</span></div>
    <div class="row"><span class="check done"></span><span class="label done">Print readings for tomorrow</span></div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
