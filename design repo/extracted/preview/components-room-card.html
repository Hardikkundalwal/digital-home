<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room card</title>
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 32px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .room-card {
    background: var(--surface);
    border: var(--card-hairline);
    border-top: 3px solid var(--room-accent);
    border-radius: var(--r-lg);
    padding: 18px;
    box-shadow: var(--shadow-1);
    display: flex; flex-direction: column; gap: 4px;
  }
  .room-card-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: color-mix(in srgb, var(--room-accent) 18%, transparent);
    color: var(--room-accent);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 8px;
  }
  .room-card h3 { font-size: 16px; font-weight: 600; }
  .room-card p { font-size: 13px; color: var(--fg-muted); margin-top: 2px; }
  .room-summary {
    margin-top: 8px;
    font-size: 12px;
    color: var(--room-accent);
    font-weight: 500;
  }
  i { width: 18px; height: 18px; stroke-width: 1.75; }
</style>
</head>
<body>
<div class="grid">
  <div class="room-card" style="--room-accent: #c4a882;">
    <span class="room-card-icon"><i data-lucide="bed"></i></span>
    <h3>Hadron's Room</h3>
    <p>Personal tasks and notes</p>
    <span class="room-summary">3 remaining</span>
  </div>
  <div class="room-card" style="--room-accent: #7a9e6b;">
    <span class="room-card-icon"><i data-lucide="book-open"></i></span>
    <h3>Hadron's Study</h3>
    <p>University tasks, notes, pomodoro</p>
    <span class="room-summary">5 remaining</span>
  </div>
  <div class="room-card" style="--room-accent: #6b8f9e;">
    <span class="room-card-icon"><i data-lucide="briefcase"></i></span>
    <h3>Hadron's Work</h3>
    <p>Job tasks, notes, quick links</p>
    <span class="room-summary">2 remaining</span>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
