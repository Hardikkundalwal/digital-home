<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 32px; }
  .group { display:flex; flex-direction: column; gap: 12px; }
  .row-buttons { display:flex; gap: 12px; align-items:center; flex-wrap: wrap; }
  .btn-primary { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.2rem; background: var(--accent); color: var(--accent-ink); border: none; border-radius: var(--r-sm); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s ease; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; background: var(--surface); color: var(--fg); border: 1px solid var(--border); border-radius: var(--r-sm); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-icon { background: none; border: 1px solid var(--border); border-radius: var(--r-sm); padding: 0.5rem 0.65rem; cursor: pointer; color: var(--fg); display:inline-flex; }
  .btn-small { display:inline-flex; align-items:center; gap: 0.3rem; padding: 0.3rem 0.7rem; font-size: 0.8rem; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--surface); color: var(--fg); cursor: pointer; }
  .btn-ghost { background: none; color: var(--fg-muted); border: none; padding: 0.3rem 0.6rem; font-size: 0.8rem; cursor: pointer; }
  .pill-btn { padding: 0.35rem 0.85rem; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--fg); font-size: 0.8rem; cursor: pointer; }
  .pill-btn.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.06em; text-transform: uppercase; min-width: 80px; }
  .line { display:flex; align-items: center; gap: 16px; }
  i { width: 16px; height: 16px; }
</style>
</head>
<body>
<div class="group">
  <div class="line">
    <span class="lab">Primary</span>
    <button class="btn-primary"><i data-lucide="plus"></i> Add a task</button>
    <button class="btn-primary"><i data-lucide="play"></i> Start</button>
  </div>
  <div class="line">
    <span class="lab">Secondary</span>
    <button class="btn-secondary"><i data-lucide="undo-2"></i> Reset</button>
    <button class="btn-icon" title="Leave home"><i data-lucide="door-open"></i></button>
  </div>
  <div class="line">
    <span class="lab">Small</span>
    <button class="btn-small"><i data-lucide="plus"></i> Create</button>
    <button class="btn-ghost">Cancel</button>
  </div>
  <div class="line">
    <span class="lab">Pill</span>
    <button class="pill-btn active">Jazz</button>
    <button class="pill-btn">Classical</button>
    <button class="pill-btn">News</button>
    <button class="pill-btn">Lo-Fi</button>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
