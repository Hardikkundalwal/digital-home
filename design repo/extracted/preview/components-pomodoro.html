<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pomodoro</title>
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 24px; }
  .pomo {
    display: flex; align-items: center; gap: 28px;
    background: var(--surface);
    border: var(--card-hairline);
    border-radius: var(--r-lg);
    padding: 24px 28px;
  }
  .ring-wrap { position: relative; }
  .ring { width: 140px; height: 140px; }
  .ring-time {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
  }
  .side { display: flex; flex-direction: column; gap: 12px; flex: 1; }
  .mode {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 600;
    color: var(--accent);
  }
  .actions { display: flex; gap: 8px; }
  .btn-primary { display:inline-flex; align-items:center; gap: 6px; padding: 8px 16px; background: var(--accent); color: var(--accent-ink); border:none; border-radius: var(--r-sm); font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-secondary { display:inline-flex; align-items:center; gap: 6px; padding: 8px 14px; background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); border-radius: var(--r-sm); font-size: 13px; cursor: pointer; }
  .beats { font-size: 12px; color: var(--fg-muted); display: inline-flex; align-items: center; gap: 8px; margin-top: 4px; }
  i { width: 14px; height: 14px; stroke-width: 1.75; }
</style>
</head>
<body>
<div class="pomo">
  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="60" fill="none" stroke="#3d3d3d" stroke-width="6"/>
      <circle cx="70" cy="70" r="60" fill="none" stroke="#c4a882" stroke-width="6"
        stroke-linecap="round"
        stroke-dasharray="377"
        stroke-dashoffset="105"
        transform="rotate(-90 70 70)"
      />
    </svg>
    <div class="ring-time">17:42</div>
  </div>
  <div class="side">
    <span class="mode"><i data-lucide="book-open"></i> Focus</span>
    <div class="actions">
      <button class="btn-primary"><i data-lucide="pause"></i> Pause</button>
      <button class="btn-secondary"><i data-lucide="undo-2"></i> Reset</button>
    </div>
    <span class="beats"><i data-lucide="headphones"></i> Binaural · Focus (40 Hz)</span>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
