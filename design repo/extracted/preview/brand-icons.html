<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Icons</title>
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 32px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }
  .ic-cell {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 14px 8px;
    background: var(--surface);
    border: var(--card-hairline);
    border-radius: 10px;
  }
  .ic-cell span { font-size: 11px; color: var(--fg-muted); text-align: center; line-height: 1.3; font-family: var(--font-mono); }
  i { width: 20px; height: 20px; stroke-width: 1.75; color: var(--fg); }
  .ic-cell.accent i { color: var(--accent); }
</style>
</head>
<body>
<div class="grid">
  <div class="ic-cell accent"><i data-lucide="home"></i><span>home</span></div>
  <div class="ic-cell"><i data-lucide="door-open"></i><span>door-open</span></div>
  <div class="ic-cell"><i data-lucide="bed"></i><span>bed</span></div>
  <div class="ic-cell"><i data-lucide="book-open"></i><span>book-open</span></div>
  <div class="ic-cell"><i data-lucide="briefcase"></i><span>briefcase</span></div>
  <div class="ic-cell"><i data-lucide="wifi"></i><span>wifi</span></div>
  <div class="ic-cell"><i data-lucide="pencil"></i><span>pencil</span></div>
  <div class="ic-cell"><i data-lucide="clipboard-list"></i><span>clipboard-list</span></div>
  <div class="ic-cell"><i data-lucide="timer"></i><span>timer</span></div>
  <div class="ic-cell"><i data-lucide="calendar"></i><span>calendar</span></div>
  <div class="ic-cell"><i data-lucide="radio"></i><span>radio</span></div>
  <div class="ic-cell"><i data-lucide="settings"></i><span>settings</span></div>
  <div class="ic-cell"><i data-lucide="play"></i><span>play</span></div>
  <div class="ic-cell"><i data-lucide="pause"></i><span>pause</span></div>
  <div class="ic-cell"><i data-lucide="undo-2"></i><span>undo-2</span></div>
  <div class="ic-cell"><i data-lucide="plus"></i><span>plus</span></div>
  <div class="ic-cell"><i data-lucide="x"></i><span>x</span></div>
  <div class="ic-cell"><i data-lucide="trash-2"></i><span>trash-2</span></div>
  <div class="ic-cell"><i data-lucide="arrow-left"></i><span>arrow-left</span></div>
  <div class="ic-cell"><i data-lucide="arrow-right"></i><span>arrow-right</span></div>
  <div class="ic-cell"><i data-lucide="headphones"></i><span>headphones</span></div>
  <div class="ic-cell"><i data-lucide="help-circle"></i><span>help-circle</span></div>
  <div class="ic-cell"><i data-lucide="sun"></i><span>sun</span></div>
  <div class="ic-cell"><i data-lucide="cloud-sun"></i><span>cloud-sun</span></div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
