<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 32px; }
  .scale { display: flex; flex-direction: column; gap: 10px; }
  .row-item {
    display: grid;
    grid-template-columns: 64px 64px 1fr;
    align-items: center;
    gap: 16px;
  }
  .name {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg);
    letter-spacing: 0.04em;
  }
  .val {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
  }
  .bar {
    height: 18px;
    background: var(--accent);
    border-radius: 4px;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="scale">
  <div class="row-item"><span class="name">sp-1</span><span class="val">4 px</span><div class="bar" style="width:4px;"></div></div>
  <div class="row-item"><span class="name">sp-2</span><span class="val">8 px</span><div class="bar" style="width:8px;"></div></div>
  <div class="row-item"><span class="name">sp-3</span><span class="val">12 px</span><div class="bar" style="width:12px;"></div></div>
  <div class="row-item"><span class="name">sp-4</span><span class="val">16 px</span><div class="bar" style="width:16px;"></div></div>
  <div class="row-item"><span class="name">sp-5</span><span class="val">20 px</span><div class="bar" style="width:20px;"></div></div>
  <div class="row-item"><span class="name">sp-6</span><span class="val">24 px</span><div class="bar" style="width:24px;"></div></div>
  <div class="row-item"><span class="name">sp-7</span><span class="val">32 px</span><div class="bar" style="width:32px;"></div></div>
  <div class="row-item"><span class="name">sp-8</span><span class="val">40 px</span><div class="bar" style="width:40px;"></div></div>
  <div class="row-item"><span class="name">sp-9</span><span class="val">56 px</span><div class="bar" style="width:56px;"></div></div>
  <div class="row-item"><span class="name">sp-10</span><span class="val">72 px</span><div class="bar" style="width:72px;"></div></div>
</div>
</body>
</html>
