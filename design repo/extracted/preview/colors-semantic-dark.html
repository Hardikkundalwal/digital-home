<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Semantic surfaces — dark</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 32px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
</style>
</head>
<body>
<div class="frame">
  <div class="grid">
    <div class="swatch">
      <div class="swatch-chip" style="background:var(--bg);"></div>
      <div class="swatch-meta"><span class="swatch-name">bg</span><span class="swatch-hex">#1a1a1a</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:var(--surface);"></div>
      <div class="swatch-meta"><span class="swatch-name">surface</span><span class="swatch-hex">#242424</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:var(--surface-2);"></div>
      <div class="swatch-meta"><span class="swatch-name">surface-2</span><span class="swatch-hex">#2b2b2b</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:var(--border); border-color:#444;"></div>
      <div class="swatch-meta"><span class="swatch-name">border</span><span class="swatch-hex">#333333</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#f5f0e8;"></div>
      <div class="swatch-meta"><span class="swatch-name">fg</span><span class="swatch-hex">#f5f0e8</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#8a7f6e;"></div>
      <div class="swatch-meta"><span class="swatch-name">fg-muted</span><span class="swatch-hex">#8a7f6e</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:var(--accent);"></div>
      <div class="swatch-meta"><span class="swatch-name">accent</span><span class="swatch-hex">#c4a882</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:var(--accent-hover);"></div>
      <div class="swatch-meta"><span class="swatch-name">accent-hover</span><span class="swatch-hex">#b8986e</span></div>
    </div>
  </div>
</div>
</body>
</html>
