<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared room card</title>
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 24px; }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .shared-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface);
    border: var(--card-hairline);
    border-radius: var(--r-lg);
    padding: 14px 18px;
    cursor: pointer;
    box-shadow: var(--shadow-1);
  }
  .icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .info { flex: 1; display:flex; flex-direction:column; gap: 2px; }
  .name { font-size: 15px; font-weight: 600; color: var(--fg); }
  .code { font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.06em; }
  .chevron { color: var(--fg-muted); display:inline-flex; }
  i { width: 18px; height: 18px; stroke-width: 1.75; }
</style>
</head>
<body>
<div class="list">
  <div class="shared-card">
    <span class="icon"><i data-lucide="wifi"></i></span>
    <div class="info">
      <span class="name">Sunset Apartment</span>
      <span class="code">OUR-X7K2 · 3 members</span>
    </div>
    <span class="chevron"><i data-lucide="arrow-right"></i></span>
  </div>
  <div class="shared-card">
    <span class="icon"><i data-lucide="wifi"></i></span>
    <div class="info">
      <span class="name">Maple Lane</span>
      <span class="code">FAM-Q9P3 · 5 members</span>
    </div>
    <span class="chevron"><i data-lucide="arrow-right"></i></span>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
