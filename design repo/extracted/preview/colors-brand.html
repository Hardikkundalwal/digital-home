<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brand colors</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 32px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="grid">
    <div class="swatch">
      <div class="swatch-chip" style="background:#1a1a1a; border-color:#3d3d3d;"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Charcoal 900</span>
        <span class="swatch-hex">#1a1a1a · bg</span>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#242424; border-color:#3d3d3d;"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Charcoal 800</span>
        <span class="swatch-hex">#242424 · surface</span>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#c4a882;"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Gold 500</span>
        <span class="swatch-hex">#c4a882 · accent dk</span>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#8b6f47;"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Gold 700</span>
        <span class="swatch-hex">#8b6f47 · accent lt</span>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#f5efe6;"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Cream 50</span>
        <span class="swatch-hex">#f5efe6 · bg light</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
