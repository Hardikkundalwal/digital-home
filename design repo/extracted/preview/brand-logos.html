<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo system</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 32px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .logo-cell {
    border-radius: var(--r-lg);
    border: var(--card-hairline);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 24px 16px;
  }
  .logo-cell img { max-width: 100%; max-height: 72px; }
  .logo-cell.dark { background: #1a1a1a; }
  .logo-cell.light { background: #f5efe6; }
  .lab { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  .logo-cell.dark .lab { color: #8a7f6e; }
  .logo-cell.light .lab { color: #8a7f6e; }
</style>
</head>
<body>
<div class="grid">
  <div class="logo-cell dark">
    <img src="../assets/logo-mark-dark.svg" alt="mark dark" />
    <span class="lab">Mark · dark</span>
  </div>
  <div class="logo-cell dark">
    <img src="../assets/wordmark-dark.svg" alt="wordmark dark" />
    <span class="lab">Wordmark · dark</span>
  </div>
  <div class="logo-cell dark">
    <img src="../assets/app-icon-dark.svg" alt="app icon dark" style="max-height:96px; border-radius:22px;" />
    <span class="lab">App icon · dark</span>
  </div>
  <div class="logo-cell light">
    <img src="../assets/logo-mark-light.svg" alt="mark light" />
    <span class="lab">Mark · light</span>
  </div>
  <div class="logo-cell light">
    <img src="../assets/wordmark-light.svg" alt="wordmark light" />
    <span class="lab">Wordmark · light</span>
  </div>
  <div class="logo-cell light">
    <img src="../assets/app-icon-light.svg" alt="app icon light" style="max-height:96px; border-radius:22px;" />
    <span class="lab">App icon · light</span>
  </div>
</div>
</body>
</html>
